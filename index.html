<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasibul Make voter search</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #334155;
        }

        /* সিক্রেট পিন লক স্ক্রিন */
        #secretLockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, #312e81, #0f172a);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }

        .lock-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .lock-container h2 { color: #fff; margin-bottom: 20px; }

        .pin-input {
            width: 100%;
            padding: 14px;
            text-align: center;
            font-size: 22px;
            letter-spacing: 8px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-bottom: 20px;
        }

        .lock-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* মূল কন্টেইনার */
        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            border-radius: 20px;
            margin-top: 30px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        /* নতুন প্রিমিয়াম হেডার ডিজাইন */
        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin: -25px -25px 25px -25px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: #fff;
            border-bottom: 4px solid #6366f1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-box { display: flex; flex-direction: column; gap: 16px; }

        .input-group { display: flex; align-items: center; justify-content: space-between; }

        .input-group label { font-weight: 600; width: 90px; color: #475569; font-size: 15px; }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #cbd5e1;
            border-radius: 10px;
            background-color: #f8fafc;
        }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }

        .btn {
            padding: 13px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #fff;
        }

        .btn-search { background-color: #10b981; }
        .btn-clear { background-color: #ef4444; }

        .voter-card {
            background: #fff;
            border: 2px solid #e11d48;
            border-radius: 14px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header { background: #1e293b; padding: 14px 18px; color: #fff; display: flex; justify-content: space-between; }

        .gender-tag { background: #be123c; color: #fff; padding: 5px 16px; border-radius: 50px; font-size: 12px; }

        .footer-branding {
            margin-top: auto;
            padding: 24px;
            text-align: center;
            font-weight: 700;
            position: relative;
        }

        .footer-branding::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 44%;
            width: 12%;
            height: 4px;
            background: linear-gradient(90deg, #10b981, #6366f1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="secretLockScreen">
        <div class="lock-container">
            <h2>সিক্রেট এক্সেস পিন দিন</h2>
            <input type="password" id="secretPinInput" class="pin-input" maxlength="4" placeholder="••••">
            <button type="button" onclick="verifySecretPin()" class="lock-btn">আনলক করুন</button>
        </div>
    </div>

    <div class="container">
        <h1>Hasibul Voter Search</h1>
        <div class="filter-box">
            <div class="input-group"><label>নাম:</label><input type="text" id="searchName" placeholder="লিখুন..."></div>
            <div class="input-group"><label>পিতা:</label><input type="text" id="searchFather" placeholder="লিখুন..."></div>
            <div class="input-group"><label>মাতা:</label><input type="text" id="searchMother" placeholder="লিখুন..."></div>
            <div class="input-group"><label>গ্রাম:</label><input type="text" id="searchVillage" placeholder="লিখুন..."></div>
            <div class="input-group"><label>জন্ম তারিখ:</label><input type="text" id="searchDob" placeholder="যেমন: ২০/০৪/২০০৪"></div>
            <div class="input-group"><label>আইডি:</label><input type="text" id="searchId" placeholder="আইডি নং লিখুন..."></div>
            <div class="button-grid">
                <button type="button" onclick="triggerSearch()" class="btn btn-search">সার্চ</button>
                <button type="button" onclick="clearFilters()" class="btn btn-clear">ক্লিয়ার</button>
            </div>
        </div>
        <div id="voterList"></div>
    </div>

    <div class="footer-branding">Develop Hasibul</div>

    <script src="male_voters.js"></script>
    <script src="female_voters.js"></script>
    <script>
        function verifySecretPin() {
            const inputPin = document.getElementById('secretPinInput').value;
            if (btoa(inputPin) === "OTkwMA==") { // পিন ৯৯০০
                document.getElementById('secretLockScreen').style.display = 'none';
            } else { alert("ভুল পিন!"); }
        }

        // বাকি সার্চ এবং ডিসপ্লে ফাংশন আগের মতোই থাকবে...
        function triggerSearch() { /* আগের ফাংশনটি এখানে বসিয়ে দিন */ }
        function displayVoters(data) { /* আগের ফাংশনটি এখানে বসিয়ে দিন */ }
        function clearFilters() { /* আগের ফাংশনটি এখানে বসিয়ে দিন */ }
    </script>
</body>
</html>
