<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Data Search System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts for Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f0f4f8;
            -webkit-user-select: text;
            user-select: text;
        }
        input, select {
            pointer-events: auto !important;
        }
    </style>
</head>
<body class="bg-[#f0f4f8] pb-10">

    <!-- টপ ব্লু হেডার বার -->
    <div class="bg-[#1e6cd9] text-white text-center py-3 px-4 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-wide">Easy Data Search System</h1>
    </div>

    <div class="max-w-md mx-auto px-3 mt-3">
        <!-- সার্চ প্যানেল কার্ড -->
        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-200">
            
            <!-- ড্রপডাউন ফিল্টার (জেলা এবং উপজেলা) -->
            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="districtSelect" class="w-full bg-white border border-gray-300 rounded px-2 py-1.5 text-sm outline-none text-gray-700">
                    <option value="Pabna">Pabna</option>
                </select>
                <select id="upazilaSelect" class="w-full bg-white border border-gray-300 rounded px-2 py-1.5 text-sm outline-none text-gray-700">
                    <option value="Pabna Sadar">Pabna Sadar</option>
                </select>
            </div>

            <!-- ইনপুট গ্রিড (নাম, পিতা, মাতা, গ্রাম) -->
            <div class="space-y-2 text-sm text-gray-700">
                <div class="grid grid-cols-12 items-center gap-1">
                    <label class="col-span-2 font-medium">নাম:</label>
                    <input type="text" id="searchName" placeholder="লিখুন..." class="col-span-10 border border-gray-300 rounded px-3 py-1.5 outline-none focus:border-blue-500 bg-gray-50/50">
                </div>
                <div class="grid grid-cols-12 items-center gap-1">
                    <label class="col-span-2 font-medium">পিতা:</label>
                    <input type="text" id="searchFather" placeholder="লিখুন..." class="col-span-10 border border-gray-300 rounded px-3 py-1.5 outline-none focus:border-blue-500 bg-gray-50/50">
                </div>
                <div class="grid grid-cols-12 items-center gap-1">
                    <label class="col-span-2 font-medium">মাতা:</label>
                    <input type="text" id="searchMother" placeholder="লিখুন..." class="col-span-10 border border-gray-300 rounded px-3 py-1.5 outline-none focus:border-blue-500 bg-gray-50/50">
                </div>
                <div class="grid grid-cols-12 items-center gap-1">
                    <label class="col-span-2 font-medium">গ্রাম:</label>
                    <input type="text" id="searchVillage" placeholder="লিখুন..." class="col-span-10 border border-gray-300 rounded px-3 py-1.5 outline-none focus:border-blue-500 bg-gray-50/50">
                </div>
                
                <!-- অতিরিক্ত ফিল্টার (আইডি সার্চ করার বিশেষ ব্যাকআপ) -->
                <div class="grid grid-cols-12 items-center gap-1">
                    <label class="col-span-2 font-medium">আইডি:</label>
                    <input type="text" id="searchId" placeholder="আইডি নং লিখুন..." class="col-span-10 border border-gray-300 rounded px-3 py-1.5 outline-none focus:border-blue-500 bg-gray-50/50">
                </div>
            </div>

            <!-- সবুজ সার্চ এবং লাল ক্লিয়ার বাটন -->
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="triggerSearch()" class="w-full bg-[#28a745] hover:bg-[#218838] text-white py-2 rounded font-medium text-base shadow-sm flex items-center justify-center gap-2 transition-all">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i> সার্চ
                </button>
                <button onclick="clearFilters()" class="w-full bg-[#dc3545] hover:bg-[#c82333] text-white py-2 rounded font-medium text-base shadow-sm flex items-center justify-center gap-2 transition-all">
                    <i class="fa-solid fa-rotate-left text-sm"></i> ক্লিয়ার
                </button>
            </div>
        </div>

        <!-- সাব-হেডার ইনফো বার -->
        <div class="flex justify-between items-center mt-4 bg-[#e2f0fd] border border-[#b6daf9] rounded px-3 py-1.5 text-xs font-semibold text-[#1e6cd9]">
            <span>Search your data, just a second</span>
            <span>ফলাফল: <span id="totalCount" class="font-bold">০</span> জন</span>
        </div>

        <!-- ভোটার লিস্ট ডাটা কন্টেইনার -->
        <div id="voterList" class="space-y-4 mt-3"></div>
    </div>

    <!-- আপনার ভোটার ডাটা ফাইল লিংক -->
    <script src="male_voters.js"></script>

    <script>
        // ভোটার ডাটা রেন্ডার করার মেইন ফাংশন (হুবহু স্ক্রিনশটের লেআউট)
        function displayVoters(data) {
            const listContainer = document.getElementById('voterList');
            const totalCount = document.getElementById('totalCount');
            
            listContainer.innerHTML = '';
            totalCount.innerText = data.length;

            if (!data || data.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center text-gray-400 bg-white rounded-lg py-12 border border-gray-200">
                        <i class="fa-solid fa-folder-open text-3xl mb-2 text-gray-300"></i>
                        <p class="text-base font-medium">কোনো তথ্য পাওয়া যায়নি!</p>
                    </div>
                `;
                return;
            }

            data.forEach((voter, index) => {
                // ইনডেক্সিং ২ ডিজিটের করার জন্য (যেমন: ০১, ০২, ০৩)
                const displayIndex = String(index + 1).padStart(2, '০'); 
                
                const card = `
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <!-- কার্ড টপ বার (নীল রঙের নাম ও আইডি বার) -->
                        <div class="bg-[#1e6cd9] text-white px-3 py-2 flex justify-between items-center gap-2">
                            <h2 class="text-base font-bold truncate">${displayIndex}. নাম: ${voter.name || ''}</h2>
                            <span class="text-xs bg-[#1651a3] px-2 py-1 rounded font-mono flex items-center gap-1 shrink-0">
                                ID: ${voter.voterId || ''} <i class="fa-regular fa-copy cursor-pointer text-[10px]" onclick="navigator.clipboard.writeText('${voter.voterId || ''}')"></i>
                            </span>
                        </div>
                        
                        <!-- কার্ড বডি (লাল বর্ডার এফেক্ট সহ ভেতরের মূল তথ্য) -->
                        <div class="p-3 border-x-2 border-b-2 border-t-0 border-[#f25e5e]/30 space-y-2 text-sm text-gray-800">
                            <div class="flex items-start gap-2"><i class="fa-solid fa-user text-gray-400 mt-1 text-xs w-4"></i> <span class="text-gray-500 w-20 shrink-0">পিতা:</span> <span class="font-medium">${voter.fatherName || ''}</span></div>
                            <div class="flex items-start gap-2"><i class="fa-solid fa-user text-gray-400 mt-1 text-xs w-4"></i> <span class="text-gray-500 w-20 shrink-0">মাতা:</span> <span class="font-medium">${voter.motherName || ''}</span></div>
                            <div class="flex items-start gap-2"><i class="fa-solid fa-briefcase text-gray-400 mt-1 text-xs w-4"></i> <span class="text-gray-500 w-20 shrink-0">পেশা:</span> <span class="font-medium">${voter.profession || ''}</span></div>
                            <div class="flex items-start gap-2"><i class="fa-solid fa-cake-candles text-gray-400 mt-1 text-xs w-4"></i> <span class="text-gray-500 w-20 shrink-0">জন্ম তারিখ:</span> <span class="font-medium">${voter.dob || ''}</span></div>
                            
                            <!-- মিডল ডিভাইডার গ্রিড (ওয়ার্ড, পোস্টকোড, ডাকঘর) -->
                            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-gray-100 text-xs text-gray-600">
                                <div class="flex gap-1"><i class="fa-solid fa-location-dot text-gray-400 w-3"></i> <span>ওয়ার্ড নং:</span> <span class="font-bold text-green-600">০১</span></div>
                                <div class="flex gap-1"><i class="fa-solid fa-envelope text-gray-400 w-3"></i> <span>পোস্টকোড:</span> <span class="font-bold text-[#e67e22]">৬৬০০</span></div>
                                <div class="flex gap-1 col-span-2"><i class="fa-solid fa-mail-bulk text-gray-400 w-3"></i> <span>ডাকঘর:</span> <span class="font-bold text-blue-600">গঙ্গারামপুর</span></div>
                            </div>
                            
                            <!-- ফুল ঠিকানা বক্স -->
                            <div class="bg-gray-50 p-2 rounded text-xs text-gray-700 border border-gray-100 flex items-start gap-1.5">
                                <i class="fa-solid fa-house text-gray-400 mt-0.5"></i>
                                <div><span class="font-bold">ঠিকানা:</span> ${voter.address || ''}</div>
                            </div>
                            
                            <!-- বটম বার (এরিয়া কোড এবং লিঙ্গ ট্যাগ) -->
                            <div class="flex justify-between items-center pt-1 text-xs">
                                <span class="text-gray-400 font-mono">এরিয়া কোড: 130777</span>
                                <span class="bg-[#c2185b] text-white px-2 py-0.5 rounded-full font-medium flex items-center gap-1">
                                    <i class="fa-solid fa-mars text-[10px]"></i> পুরুষ
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        // মাল্টিপল ফিল্টার সার্চ ইঞ্জিন লজিক
        function triggerSearch() {
            const nameQuery = document.getElementById('searchName').value.toLowerCase().trim();
            const fatherQuery = document.getElementById('searchFather').value.toLowerCase().trim();
            const motherQuery = document.getElementById('searchMother').value.toLowerCase().trim();
            const villageQuery = document.getElementById('searchVillage').value.toLowerCase().trim();
            const idQuery = document.getElementById('searchId').value.trim();

            const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];

            const filtered = targetData.filter(voter => {
                const matchName = !nameQuery || (voter.name && voter.name.toLowerCase().includes(nameQuery));
                const matchFather = !fatherQuery || (voter.fatherName && voter.fatherName.toLowerCase().includes(fatherQuery));
                const matchMother = !motherQuery || (voter.motherName && voter.motherName.toLowerCase().includes(motherQuery));
                const matchVillage = !villageQuery || (voter.address && voter.address.toLowerCase().includes(villageQuery));
                const matchId = !idQuery || (voter.voterId && voter.voterId.includes(idQuery)) || (voter.serial && voter.serial.includes(idQuery));

                return matchName && matchFather && matchMother && matchVillage && matchId;
            });

            displayVoters(filtered);
        }

        // ক্লিয়ার ফিল্টার বাটন ফাংশন
        function clearFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchFather').value = '';
            document.getElementById('searchMother').value = '';
            document.getElementById('searchVillage').value = '';
            document.getElementById('searchId').value = '';
            
            const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];
            displayVoters(targetData);
        }

        // প্রথমবার ওপেন হওয়ার সোর্স লোড
        window.onload = function() {
            setTimeout(() => {
                const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];
                displayVoters(targetData);
            }, 600);
        };
    </script>
</body>
</html>
