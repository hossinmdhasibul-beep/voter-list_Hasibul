<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভোটার তালিকা অনুসন্ধান সিস্টেম</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        .stats {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
            text-align: right;
        }
        .voter-card {
            background: #fafafa;
            border-left: 5px solid #3498db;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .voter-card.male {
            border-left-color: #1abc9c;
        }
        .voter-card.female {
            border-left-color: #9b59b6;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
        }
        .info-item {
            font-size: 15px;
            color: #34495e;
        }
        .info-item strong {
            color: #2c3e50;
        }
        .no-result {
            text-align: center;
            color: #e74c3c;
            font-size: 18px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ভোটার তালিকা অনুসন্ধান (পাবনা সদর)</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" oninput="searchVoters()" placeholder="নাম, ভোটার আইডি বা পিতা/মাতার নাম লিখে খুঁজুন...">
    </div>

    <div class="stats" id="statsCount">মোট ভোটার: ০ জন</div>
    
    <div id="results"></div>
</div>

<script>
    // ==========================================
    // ১. আপনার ফিমেল ভোটার ডাটা (যা আছে তাই রাখুন)
    // ==========================================
    const femaleVoters = [
        {
            "serial": "০০০১",
            "name": "মোছাঃ আনোয়ারী সাইদা",
            "voterId": "৭৬১৬২০২৮০০০২",
            "fatherName": "মোঃ আফছার উদ্দীন মোল্লা",
            "motherName": "মোছাঃ বেলাসেতুন নেছা",
            "profession": "গৃহিনী",
            "dob": "০১/০১/১৯৭১",
            "address": "গঙ্গারাম পুর, পাবনা সদর, পাবনা"
        },
        {
            "serial": "০০০২",
            "name": "মোছাঃ ফেরদৌসী খাতুন",
            "voterId": "৭৬১৬২০২৮০০০৫",
            "fatherName": "মোঃ মাহফুজুর রহমান",
            "motherName": "মোছাঃ আনোয়ারী সাইদা",
            "profession": "ছাত্র/ছাত্রী",
            "dob": "১৩/০২/১৯৯৭",
            "address": "গঙ্গারামপুর, পাবনা সদর, পাবনা"
        }
        // আপনার বাকি হাজার হাজার লাইনের ফিমেল ডাটা এখানে পেস্ট করতে পারেন...
    ];

    // ==========================================
    // ২. আপনার মেল ভোটার ডাটা (যা আছে তাই রাখুন)
    // ==========================================
    const voterListMale = [
        {
            "ক্রমিক নং": "০০০১",
            "নাম": "মোঃ মাহফুজুর রহমান",
            "ভোটার নং": "৭৬১৬২০২৮০০০১",
            "পিতা": "ডাঃ মোঃ আঃ ওয়াহেদ",
            "মাতা": "মোছাঃ ফিজলাতুন নেছা",
            "পেশা": "ডাক্তার",
            "জন্ম তারিখ": "০৫/০৩/১৯৬১",
            "ঠিকানা": "গঙ্গারামপুর, পাবনা সদর, পাবনা"
        },
        {
            "ক্রমিক নং": "০০০২",
            "নাম": "মোঃ মাসুদুল হক",
            "ভোটার নং": "৭৬১৬২০২৮০০০৬",
            "পিতা": "মোঃ মজিবুল হক",
            "মাতা": "মোছাঃ নাসিমা হক",
            "পেশা": "ছাত্র/ছাত্রী",
            "জন্ম তারিখ": "২২/০২/১৯৯৪",
            "ঠিকানা": "গঙ্গারামপুর, পাবনা সদর, পাবনা"
        }
        // আপনার বাকি হাজার হাজার লাইনের মেল ডাটা এখানে পেস্ট করতে পারেন...
    ];

    // ডাটা লোড ও প্রাথমিক সংখ্যা প্রদর্শন
    const totalLoaded = femaleVoters.length + voterListMale.length;
    document.getElementById('statsCount').innerText = `মোট ডাটাবেজ: ${totalLoaded} জন`;

    // ==========================================
    // ৩. সার্চ ফাংশন (ডাটা পরিবর্তন না করে খোঁজার লজিক)
    // ==========================================
    function searchVoters() {
        const query = document.getElementById('searchInput').value.trim();
        const resultsContainer = document.getElementById('results');
        resultsContainer.innerHTML = ''; // আগের রেজাল্ট ক্লিয়ার করা

        if (query === '') {
            document.getElementById('statsCount').innerText = `মোট ডাটাবেজ: ${totalLoaded} জন`;
            return;
        }

        let filteredCount = 0;

        // ফিমেল ভোটারদের মধ্যে সার্চ (ইংরেজি কী-স্ট্রাকচার)
        femaleVoters.forEach(voter => {
            if (
                voter.name.includes(query) || 
                voter.voterId.includes(query) || 
                voter.fatherName.includes(query) || 
                voter.motherName.includes(query) ||
                voter.address.includes(query)
            ) {
                filteredCount++;
                renderCard(voter, 'female');
            }
        });

        // মেল ভোটারদের মধ্যে সার্চ (বাংলা কী-স্ট্রাকচার)
        voterListMale.forEach(voter => {
            if (
                voter["নাম"].includes(query) || 
                voter["ভোটার নং"].includes(query) || 
                voter["পিতা"].includes(query) || 
                voter["মাতা"].includes(query) ||
                voter["ঠিকানা"].includes(query)
            ) {
                filteredCount++;
                renderCard(voter, 'male');
            }
        });

        // সংখ্যা আপডেট
        document.getElementById('statsCount').innerText = `খুঁজে পাওয়া গেছে: ${filteredCount} জন`;

        if (filteredCount === 0) {
            resultsContainer.innerHTML = `<div class="no-result">কোনো ভোটার তথ্য পাওয়া যায়নি!</div>`;
        }
    }

    // কার্ড রেন্ডার করার জন্য হেল্পার ফাংশন (দুই স্ট্রাকচারই ম্যাপ করে নিবে)
    function renderCard(voter, gender) {
        const resultsContainer = document.getElementById('results');
        
        // স্ট্রাকচার অনুযায়ী ভ্যারিয়েবল সেটআপ
        const serial = voter.serial || voter["ক্রমিক নং"];
        const name = voter.name || voter["নাম"];
        const voterId = voter.voterId || voter["ভোটার নং"];
        const father = voter.fatherName || voter["পিতা"];
        const mother = voter.motherName || voter["মাতা"];
        const profession = voter.profession || voter["পেশা"];
        const dob = voter.dob || voter["জন্ম তারিখ"];
        const address = voter.address || voter["ঠিকানা"];
        const genderText = gender === 'male' ? 'পুরুষ' : 'মহিলা';

        const cardHtml = `
            <div class="voter-card ${gender}">
                <div class="grid">
                    <div class="info-item"><strong>ক্রমিক নং:</strong> ${serial}</div>
                    <div class="info-item"><strong>লিঙ্গ:</strong> ${genderText}</div>
                    <div class="info-item" style="grid-column: span 2;"><strong>নাম:</strong> ${name}</div>
                    <div class="info-item"><strong>ভোটার আইডি:</strong> ${voterId}</div>
                    <div class="info-item"><strong>পিতা:</strong> ${father}</div>
                    <div class="info-item"><strong>মাতা:</strong> ${mother}</div>
                    <div class="info-item"><strong>পেশা:</strong> ${profession}</div>
                    <div class="info-item"><strong>জন্ম তারিখ:</strong> ${dob}</div>
                    <div class="info-item" style="grid-column: span 2;"><strong>ঠিকানা:</strong> ${address}</div>
                </div>
            </div>
        `;
        resultsContainer.innerHTML += cardHtml;
    }
</script>

</body>
</html>
