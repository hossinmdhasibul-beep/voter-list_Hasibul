<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <!-- মোবাইল অ্যাপের মতো ফিক্সড রাখার জন্য ভিউপোর্ট সেটিংস -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hasibul Make voter search</title>
    <style>
        /* পুরো বডিকে ফিক্সড রাখার জন্য */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* ডানে-বামে নড়াচড়া বন্ধ করতে */
            touch-action: manipulation; /* জুম প্রিভেন্ট করতে */
        }

        /* লক স্ক্রিন */
        #lockScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; 
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: white; padding: 20px; text-align: center; 
        }
        #lockScreen input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 12px; text-align: center; font-size: 18px; width: 200px; }
        #lockScreen button { padding: 12px 24px; background: #10b981; border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 20px;
            box-sizing: border-box;
            margin-top: 10px;
            border-radius: 0; /* অ্যাপের মতো করতে কর্নার শার্প রাখা যায় */
            min-height: 90vh;
        }

        h1 {
            text-align: center; color: #ffffff; font-size: 20px; font-weight: 700;
            margin: -20px -20px 20px -20px; padding: 20px;
            background: linear-gradient(135deg, #1e293b, #334155);
            border-bottom: 4px solid #6366f1;
        }

        .filter-box { display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; align-items: center; justify-content: space-between; }
        .input-group label { width: 80px; font-weight: 600; font-size: 14px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; color: #fff; }
        .btn-search { background-color: #10b981; }
        .btn-clear { background-color: #ef4444; }

        .footer-branding { padding: 20px; font-size: 14px; color: #334155; font-weight: 700; text-align: center; }
        .footer-bar { width: 40px; height: 4px; background: linear-gradient(90deg, #10b981, #6366f1); margin: 5px auto; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h3>PIN দিন</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="****">
        <button onclick="checkPin()">আনলক</button>
        <p style="color: #94a3b8; font-size: 12px; margin-top: 15px;">পাসওয়ার্ড এর জন্য এডমিন এর সাথে যোগাযোগ করুন</p>
    </div>

    <div class="container">
        <h1>Hasibul Make voter search</h1>
        <div class="filter-box">
            <div class="input-group"><label>নাম:</label><input type="text" id="searchName" placeholder="..."></div>
            <div class="input-group"><label>পিতা:</label><input type="text" id="searchFather" placeholder="..."></div>
            <div class="input-group"><label>মাতা:</label><input type="text" id="searchMother" placeholder="..."></div>
            <div class="input-group"><label>গ্রাম:</label><input type="text" id="searchVillage" placeholder="..."></div>
            <div class="input-group"><label>জন্ম:</label><input type="text" id="searchDob" placeholder="..."></div>
            <div class="input-group"><label>আইডি:</label><input type="text" id="searchId" placeholder="..."></div>
            <div class="button-grid">
                <button class="btn btn-search" onclick="triggerSearch()">সার্চ</button>
                <button class="btn btn-clear" onclick="clearFilters()">ক্লিয়ার</button>
            </div>
        </div>
        <div id="voterList"></div>
    </div>

    <div class="footer-branding">
        Develop Hasibul
        <div class="footer-bar"></div>
    </div>

    <script src="male_voters.js"></script>
    <script src="female_voters.js"></script>
    <script>
        function checkPin() {
            if(document.getElementById('pinInput').value === "9900") {
                document.getElementById('lockScreen').style.display = 'none';
            } else { alert("ভুল পিন!"); }
        }
        // আপনার সার্চ লজিক এখানে যুক্ত করুন
    </script>
</body>
</html>
