<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Data Search System</title>
    <style>
        /* কোন অদৃশ্য লেয়ার যেন তৈরি না হতে পারে তার জন্য সম্পূর্ণ ক্লিন স্টাইল */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding-bottom: 80px;
            color: #333;
        }
        .header-bar {
            background-color: #1e6cd9;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            max-width: 450px;
            margin: 15px auto;
            padding: 0 12px;
        }
        .search-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        .dropdown-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .dropdown-grid select {
            width: 50%;
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 4px;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .input-group label {
            width: 60px;
            font-size: 15px;
            font-weight: bold;
        }
        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #aaa;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            background: #fff;
            /* মোবাইল ব্রাউজারে ইনপুট সিলেকশন নিশ্চিত করার জন্য */
            -webkit-user-select: text;
            user-select: text;
        }
        .button-grid {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            width: 50%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn-search { background-color: #28a745; }
        .btn-clear { background-color: #dc3545; }
        
        .info-bar {
            background-color: #e2f0fd;
            border: 1px solid #b6daf9;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            color: #1e6cd9;
        }
        .voter-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-header {
            background-color: #1e6cd9;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: bold;
        }
        .card-body {
            padding: 12px;
            border-left: 3px solid #f25e5e;
            border-right: 3px solid #f25e5e;
            border-bottom: 3px solid #f25e5e;
        }
        .info-line {
            display: flex;
            margin-bottom: 8px;
            font-size: 14px;
            border-bottom: 1px solid #f2f2f2;
            padding-bottom: 4px;
        }
        .info-label { width: 85px; color: #666; }
        .info-value { flex: 1; font-weight: bold; }
        
        .sub-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 5px;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
            border: 1px solid #eee;
        }
        .footer-branding {
            text-align: center;
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #ddd;
            font-size: 14px;
            color: #333;
            font-weight: bold;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="header-bar">Easy Data Search System</div>

    <div class="container">
        <div class="search-card">
            <div class="dropdown-grid">
                <select><option>Pabna</option></select>
                <select><option>Pabna Sadar</option></select>
            </div>

            <div class="input-group">
                <label for="searchName">নাম:</label>
                <input type="text" id="searchName" placeholder="লিখুন...">
            </div>
            <div class="input-group">
                <label for="searchFather">পিতা:</label>
                <input type="text" id="searchFather" placeholder="লিখুন...">
            </div>
            <div class="input-group">
                <label for="searchMother">মাতা:</label>
                <input type="text" id="searchMother" placeholder="লিখুন...">
            </div>
            <div class="input-group">
                <label for="searchVillage">গ্রাম:</label>
                <input type="text" id="searchVillage" placeholder="লিখুন...">
            </div>
            <div class="input-group">
                <label for="searchId">আইডি:</label>
                <input type="text" id="searchId" placeholder="আইডি নং লিখুন...">
            </div>

            <div class="button-grid">
                <button type="button" onclick="triggerSearch()" class="btn btn-search">সার্চ</button>
                <button type="button" onclick="clearFilters()" class="btn btn-clear">ক্লিয়ার</button>
            </div>
        </div>

        <div class="info-bar">
            <span>Search your data, just a second</span>
            <span>ফলাফল: <span id="totalCount">০</span> জন</span>
        </div>

        <div id="voterList"></div>
    </div>

    <div class="footer-branding">
        Develop Hasibul
    </div>

    <script src="male_voters.js"></script>

    <script>
        function displayVoters(data) {
            const listContainer = document.getElementById('voterList');
            const totalCount = document.getElementById('totalCount');
            
            listContainer.innerHTML = '';
            totalCount.innerText = data.length;

            if (!data || data.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; padding:30px; background:white; border-radius:8px; color:#999; border:1px solid #ccc;">কোনো তথ্য পাওয়া যায়নি!</div>';
                return;
            }

            data.forEach((voter, index) => {
                const displayIndex = String(index + 1).padStart(2, '০'); 
                
                const card = `
                    <div class="voter-card">
                        <div class="card-header">
                            <div>${displayIndex}. নাম: ${voter.name || ''}</div>
                            <div style="font-size:11px; background:#1651a3; padding:2px 6px; border-radius:3px;">ID: ${voter.voterId || ''}</div>
                        </div>
                        <div class="card-body">
                            <div class="info-line"><span class="info-label">পিতা:</span><span class="info-value">${voter.fatherName || ''}</span></div>
                            <div class="info-line"><span class="info-label">মাতা:</span><span class="info-value">${voter.motherName || ''}</span></div>
                            <div class="info-line"><span class="info-label">পেশা:</span><span class="info-value">${voter.profession || ''}</span></div>
                            <div class="info-line"><span class="info-label">জন্ম তারিখ:</span><span class="info-value">${voter.dob || ''}</span></div>
                            
                            <div class="sub-grid">
                                <div><b>ওয়ার্ড নং:</b> ০১</div>
                                <div><b>পোস্টকোড:</b> ৬৬০০</div>
                                <div style="grid-column: span 2;"><b>ডাকঘর:</b> গঙ্গারামপুর</div>
                            </div>
                            
                            <div style="font-size:12px; margin-top:8px; padding:8px; background:#fafafa; border-radius:4px; border:1px solid #eee;">
                                <b>ঠিকানা:</b> ${voter.address || ''}
                            </div>
                            
                            <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:#888;">
                                <span>এরিয়া কোড: 130777</span>
                                <span style="background:#c2185b; color:white; padding:2px 8px; border-radius:10px; font-weight:bold;">পুরুষ</span>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        function triggerSearch() {
            const nameQuery = document.getElementById('searchName').value.toLowerCase().trim();
            const fatherQuery = document.getElementById('searchFather').value.toLowerCase().trim();
            const motherQuery = document.getElementById('searchMother').value.toLowerCase().trim();
            const villageQuery = document.getElementById('searchVillage').value.toLowerCase().trim();
            const idQuery = document.getElementById('searchId').value.trim();

            const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];

            const filtered = targetData.filter(voter => {
                const matchName = !nameQuery || (voter.name && voter.name.toLowerCase().includes(nameQuery));
                const matchFather = !fatherQuery || (voter.fatherName && voter.fatherName.toLowerCase().includes(fatherQuery));
                const matchMother = !motherQuery || (voter.motherName && voter.motherName.toLowerCase().includes(motherQuery));
                const matchVillage = !villageQuery || (voter.address && voter.address.toLowerCase().includes(villageQuery));
                const matchId = !idQuery || (voter.voterId && voter.voterId.includes(idQuery)) || (voter.serial && voter.serial.includes(idQuery));

                return matchName && matchFather && matchMother && matchVillage && matchId;
            });

            displayVoters(filtered);
        }

        function clearFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchFather').value = '';
            document.getElementById('searchMother').value = '';
            document.getElementById('searchVillage').value = '';
            document.getElementById('searchId').value = '';
            
            const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];
            displayVoters(targetData);
        }

        window.onload = function() {
            setTimeout(() => {
                const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];
                displayVoters(targetData);
            }, 400);
        };
    </script>
</body>
</html>
