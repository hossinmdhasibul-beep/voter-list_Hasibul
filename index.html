<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভোটার তথ্য অনুসন্ধান</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f5f6f8; margin: 0; padding: 16px; }
    </style>
</head>
<body class="max-w-md mx-auto">

    <!-- ১০০% ফিক্সড সার্চ বার লেআউট -->
    <div class="w-full mb-6 bg-[#eae8e8] rounded-full p-2 flex items-center shadow-inner">
        <div class="px-2 text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
        
        <input type="text" id="searchInput" oninput="searchVoter()" placeholder="এখানে টাইপ করুন..." class="w-full bg-transparent py-2 px-1 text-lg text-black outline-none border-none placeholder-gray-500" style="-webkit-user-select: text; user-select: text;">
        
        <div class="p-2 bg-white rounded-full text-gray-700 shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
        </div>
    </div>

    <div class="text-right text-xs text-gray-500 mb-3 px-2">
        মোট রেকর্ড: <span id="totalCount" class="font-bold">০</span> টি
    </div>

    <div id="voterList" class="space-y-5"></div>

    <script src="male_voters.js"></script>

    <script>
        function displayVoters(data) {
            const listContainer = document.getElementById('voterList');
            const totalCount = document.getElementById('totalCount');
            
            listContainer.innerHTML = '';
            totalCount.innerText = data.length.toLocaleString('bn-BD'); 

            if (!data || data.length === 0) {
                listContainer.innerHTML = `<div class="text-center text-gray-400 py-12"><p class="text-lg">কোনো তথ্য পাওয়া যায়নি!</p></div>`;
                return;
            }

            data.forEach(voter => {
                const card = `
                    <div class="bg-white p-5 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100/50 relative">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-black text-white text-sm font-bold px-4 py-1 rounded-full tracking-wider">${voter.serial || ''}</span>
                            <span class="text-xs text-gray-400 font-mono">ID: ${voter.voterId || ''}</span>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-4">${voter.name || ''}</h2>
                        <div class="space-y-2.5 text-[15px] text-gray-600">
                            <div class="flex justify-between border-b border-gray-50 pb-1.5"><span class="text-gray-400">পিতার নাম</span><span class="font-medium text-gray-800 text-right">${voter.fatherName || ''}</span></div>
                            <div class="flex justify-between border-b border-gray-50 pb-1.5"><span class="text-gray-400">মাতার নাম</span><span class="font-medium text-gray-800 text-right">${voter.motherName || ''}</span></div>
                            <div class="flex justify-between border-b border-gray-50 pb-1.5"><span class="text-gray-400">পেশা</span><span class="font-medium text-gray-800 text-right">${voter.profession || ''}</span></div>
                            <div class="flex justify-between pb-1"><span class="text-gray-400">জন্ম তারিখ</span><span class="font-medium text-gray-800 text-right">${voter.dob || ''}</span></div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-gray-100">
                            <p class="text-xs text-gray-400 font-semibold mb-1">ঠিকানা</p>
                            <p class="text-sm text-gray-700 leading-relaxed">${voter.address || ''}</p>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        function searchVoter() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];
            
            const filtered = targetData.filter(voter => {
                return (voter.name && voter.name.toLowerCase().includes(query)) || 
                       (voter.voterId && voter.voterId.includes(query)) || 
                       (voter.serial && voter.serial.includes(query)) || 
                       (voter.address && voter.address.toLowerCase().includes(query));
            });
            
            displayVoters(filtered);
        }

        window.onload = function() {
            setTimeout(() => {
                const targetData = typeof voterListMale !== 'undefined' ? voterListMale : [];
                displayVoters(targetData);
            }, 500);
        };
    </script>
</body>
</html>
